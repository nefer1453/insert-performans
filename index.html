<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İNSERT PERFORMANS - Elite Pro v3.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .yakut-yesili { background-color: #004d40; }
        .turuncu { background-color: #E67E22; }
        .nav-btn { flex: 1; padding: 15px; font-weight: 800; text-transform: uppercase; font-size: 0.7rem; }
        .active-tab { border-bottom: 5px solid #E67E22; color: #E67E22; background: white; }
        #reader { width: 100%; border-radius: 20px; overflow: hidden; display: none; border: 4px solid #004d40; }
        .search-results { position: absolute; top: 100%; left: 0; right: 0; background: white; z-index: 100; max-height: 200px; overflow-y: auto; border-radius: 0 0 15px 15px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); border: 1px solid #e2e8f0; display: none; }
        .search-item { padding: 12px 15px; border-bottom: 1px solid #f1f5f9; cursor: pointer; transition: 0.2s; }
        .search-item:hover { background: #f0fdf4; }
        #pdf-render-area { width: 794px; position: absolute; left: -9999px; top: 0; background: white; }
        .pdf-page { width: 794px; height: 1123px; padding: 50px; position: relative; box-sizing: border-box; background: white; }
        .cover-page { background: linear-gradient(135deg, #002d26 0%, #004d40 100%); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
    </style>
</head>
<body>
    <div class="max-w-md mx-auto bg-white min-h-screen shadow-2xl flex flex-col">
        <div class="yakut-yesili p-6 text-white text-center shadow-lg">
            <h1 class="text-3xl font-black italic uppercase tracking-tighter">İnsert Performans</h1>
            <p class="text-[10px] opacity-60 uppercase font-bold tracking-[4px]">Elite Data Integrity</p>
        </div>

        <div class="flex bg-gray-100 border-b sticky top-0 z-50">
            <button onclick="showTab('kayit')" id="btn-kayit" class="nav-btn active-tab">💾 ÜRÜN KAYIT</button>
            <button onclick="showTab('rapor')" id="btn-rapor" class="nav-btn text-gray-400">📊 RAPOR HAZIRLA</button>
        </div>

        <div class="px-6 py-4 bg-white">
            <div id="reader" class="mb-4"></div>
            <button onclick="toggleScanner()" class="w-full yakut-yesili text-white p-4 rounded-2xl font-black flex items-center justify-center gap-3 shadow-lg uppercase">
                📷 BARKODU TARA
            </button>
        </div>

        <div id="tab-kayit" class="p-6 space-y-4 pt-0">
            <div class="relative">
                <input type="text" id="regSearch" onkeyup="filterProducts(this.value, 'reg')" placeholder="Mevcut Ürünlerde Ara / Seç..." class="w-full border-2 border-gray-100 p-3 rounded-xl outline-none focus:border-emerald-600 font-medium text-xs bg-gray-50 italic">
                <div id="regResults" class="search-results"></div>
            </div>

            <hr class="border-gray-100">

            <div class="space-y-3">
                <div class="flex flex-col"><label class="text-[10px] font-bold text-gray-400 ml-1 uppercase">Barkod *</label>
                <input type="text" id="regBarkod" class="w-full border-b-2 p-2 outline-none font-mono text-lg focus:border-emerald-700"></div>
                
                <div class="flex flex-col"><label class="text-[10px] font-bold text-gray-400 ml-1 uppercase">Ürün İsmi *</label>
                <input type="text" id="regName" class="w-full border-b-2 p-2 outline-none focus:border-emerald-700"></div>
                
                <div class="flex flex-col"><label class="text-[10px] font-bold text-gray-400 ml-1 uppercase">Normal Fiyat (₺) *</label>
                <input type="text" id="regPrice" class="w-full border-b-2 p-2 outline-none focus:border-emerald-700"></div>
            </div>
            
            <div id="photoStatus" class="border-2 border-dashed border-red-200 rounded-xl p-4 text-center bg-red-50/30">
                <input type="file" id="prodPhotoInput" accept="image/*" class="hidden">
                <label for="prodPhotoInput" class="cursor-pointer font-bold text-red-700 block text-[10px] uppercase">📷 Ürün Fotoğrafı Çek * (GEREKLİ)</label>
                <img id="regPreview" class="hidden mt-2 w-full h-40 object-cover rounded-lg shadow-md border-2 border-white">
            </div>

            <button onclick="saveProduct()" class="w-full bg-emerald-700 text-white py-4 rounded-2xl font-black shadow-xl uppercase transform active:scale-95 transition-all">Sisteme Kaydet</button>
            <div id="productCounter" class="text-center text-[10px] font-bold text-gray-400 uppercase tracking-widest pt-2"></div>
        </div>

        <div id="tab-rapor" class="hidden p-6 space-y-5 pt-0">
            <div class="relative">
                <input type="text" id="smartSearch" onkeyup="filterProducts(this.value, 'rep')" placeholder="Ürün Ara..." class="w-full border-2 border-orange-100 p-3 rounded-xl outline-none focus:border-orange-500 font-medium text-sm">
                <div id="repResults" class="search-results"></div>
            </div>

            <div class="bg-gray-900 p-4 rounded-2xl shadow-xl border-l-4 border-orange-500">
                <input type="text" id="reportBarkod" placeholder="Barkod" class="w-full bg-transparent text-white font-mono text-center outline-none text-xl" readonly>
                <p id="dispName" class="text-orange-500 font-black text-center uppercase italic text-xs mt-1">Ürün Bekleniyor...</p>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <input type="number" id="nSales" placeholder="Normal Satış" class="border-2 p-4 rounded-xl text-center font-bold">
                <input type="number" id="iSales" placeholder="İnsert Satış" class="border-2 p-4 rounded-xl text-center font-bold bg-orange-50">
            </div>

            <div class="border-4 border-dashed border-gray-100 rounded-2xl p-4 text-center bg-gray-50">
                <input type="file" id="reportPhotoInput" accept="image/*" class="hidden">
                <label for="reportPhotoInput" class="cursor-pointer font-black text-gray-400 block uppercase text-[10px]">📸 Teşhir Görseli Ekle</label>
                <img id="reportPreview" class="hidden mt-2 w-full h-40 object-cover rounded-xl shadow-md border-2 border-white">
            </div>

            <button onclick="generateReport()" class="turuncu w-full py-5 rounded-2xl text-white font-black shadow-2xl uppercase">📄 Elite Raporu Oluştur</button>
        </div>
    </div>

    <div id="pdf-render-area">
        <div class="pdf-page cover-page">
            <div style="border: 10px solid #E67E22; padding: 60px; width: 80%;">
                <h1 style="font-size: 70px; font-weight: 900; letter-spacing: -4px; margin: 0;">İNSERT PERFORMANS</h1>
                <div style="height: 5px; background: #E67E22; width: 100px; margin: 30px auto;"></div>
                <h2 style="font-size: 26px; font-weight: 400; text-transform: uppercase; letter-spacing: 12px;">SATIŞ ANALİZİ</h2>
            </div>
            <div style="position: absolute; bottom: 80px; width: 100%; font-weight: 700;">
                <p style="font-size: 24px;" id="pdf-date-cover"></p>
                <p style="text-transform: uppercase; letter-spacing: 5px; color: #E67E22; margin-top: 10px;">HAZIRLAYAN: SELÇUK</p>
            </div>
        </div>
        <div class="pdf-page">
            <div style="display: flex; gap: 40px; height: 100%;">
                <div style="flex: 1.1; display: flex; flex-direction: column;">
                    <div style="background: #f8fafc; border: 4px solid #f1f5f9; border-radius: 30px; padding: 30px; flex-grow: 1;">
                        <img id="pdf-prod-image" style="width: 100%; height: 500px; object-fit: cover; border-radius: 20px; background: #eee;">
                        <div style="margin-top: 40px;">
                            <h2 id="pdf-pName" style="font-size: 38px; font-weight: 900; color: #004d40; margin: 0; text-transform: uppercase;"></h2>
                            <div style="height: 6px; background: #E67E22; width: 70px; margin: 20px 0;"></div>
                            <p id="pdf-barkod" style="font-size: 18px; color: #64748b; font-weight: 700;"></p>
                            <p id="pdf-pPrice" style="font-size: 22px; color: #004d40; font-weight: 900;"></p>
                        </div>
                    </div>
                </div>
                <div style="flex: 0.9; display: flex; flex-direction: column; gap: 20px;">
                    <div style="background: #004d40; color: white; border-radius: 25px; padding: 25px; text-align: center;"><h2 style="font-size: 20px; font-weight: 900; margin: 0;">PERFORMANS ANALİZİ</h2></div>
                    <img id="pdf-report-image" style="width: 100%; height: 350px; object-fit: cover; border-radius: 20px; background: #eee;">
                    <div style="background: #fff; border: 4px solid #f1f5f9; border-radius: 25px; padding: 25px; flex-grow: 1; border-top: 8px solid #E67E22;">
                        <p id="pdf-ai-text" style="font-size: 19px; color: #334155; font-weight: 600; font-style: italic; line-height: 1.4;"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('insert_db')) || {};
        let regPhotoBase64 = "";

        function showTab(tab) {
            document.getElementById('tab-kayit').classList.toggle('hidden', tab !== 'kayit');
            document.getElementById('tab-rapor').classList.toggle('hidden', tab !== 'rapor');
            document.getElementById('btn-kayit').className = `nav-btn ${tab === 'kayit' ? 'active-tab' : 'text-gray-400'}`;
            document.getElementById('btn-rapor').className = `nav-btn ${tab === 'rapor' ? 'active-tab' : 'text-gray-400'}`;
        }

        // Akıllı Filtreleme (Kayıt ve Rapor ekranı için)
        function filterProducts(val, screen) {
            const resultsDiv = document.getElementById(screen === 'reg' ? 'regResults' : 'repResults');
            resultsDiv.innerHTML = '';
            if (val.length < 1) { resultsDiv.style.display = 'none'; return; }

            const matches = Object.entries(db).filter(([barkod, info]) => 
                info.n.toLowerCase().includes(val.toLowerCase()) || barkod.includes(val)
            );

            if (matches.length > 0) {
                matches.forEach(([barkod, info]) => {
                    const div = document.createElement('div');
                    div.className = 'search-item';
                    div.innerHTML = `<div class="font-bold text-gray-800 text-sm">${info.n}</div><div class="text-[9px] text-gray-400 font-mono">${barkod}</div>`;
                    div.onclick = () => {
                        if(screen === 'reg') {
                            fillRegForm(barkod, info);
                        } else {
                            selectReportProduct(barkod, info);
                        }
                        resultsDiv.style.display = 'none';
                    };
                    resultsDiv.appendChild(div);
                });
                resultsDiv.style.display = 'block';
            } else { resultsDiv.style.display = 'none'; }
        }

        function fillRegForm(barkod, info) {
            document.getElementById('regBarkod').value = barkod;
            document.getElementById('regName').value = info.n;
            document.getElementById('regPrice').value = info.p;
            if(info.img) {
                regPhotoBase64 = info.img;
                document.getElementById('regPreview').src = info.img;
                document.getElementById('regPreview').classList.remove('hidden');
                document.getElementById('photoStatus').className = "border-2 border-dashed border-emerald-200 rounded-xl p-4 text-center bg-emerald-50/30";
            }
        }

        function selectReportProduct(barkod, info) {
            document.getElementById('reportBarkod').value = barkod;
            document.getElementById('smartSearch').value = info.n;
            document.getElementById('dispName').innerText = `Ürün: ${info.n}`;
        }

        function compressImage(file, callback) {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = event => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 600;
                    const scaleSize = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scaleSize;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    callback(canvas.toDataURL('image/jpeg', 0.7));
                };
            };
        }

        document.getElementById('prodPhotoInput').onchange = e => {
            if (e.target.files[0]) {
                compressImage(e.target.files[0], base64 => {
                    regPhotoBase64 = base64;
                    document.getElementById('regPreview').src = base64;
                    document.getElementById('regPreview').classList.remove('hidden');
                    document.getElementById('photoStatus').className = "border-2 border-dashed border-emerald-200 rounded-xl p-4 text-center bg-emerald-50/30";
                });
            }
        };

        function saveProduct() {
            const b = document.getElementById('regBarkod').value.trim();
            const n = document.getElementById('regName').value.trim();
            const p = document.getElementById('regPrice').value.trim();
            
            // SIKI DENETİM
            if(!b || !n || !p || !regPhotoBase64) {
                alert("❌ DUR! Barkod, İsim, Fiyat ve FOTOĞRAF alanları zorunludur. Lütfen tüm alanları doldur.");
                return;
            }

            try {
                db[b] = { n, p, img: regPhotoBase64 };
                localStorage.setItem('insert_db', JSON.stringify(db));
                alert("✅ Harika! Ürün portföye başarıyla eklendi.");
                location.reload();
            } catch (e) { alert("Hata: Hafıza dolu!"); }
        }

        function updateCounter() {
            document.getElementById('productCounter').innerText = `Portföy: ${Object.keys(db).length} ÜRÜN`;
        }
        updateCounter();

        // RAPOR MANTIKLARI
        document.getElementById('reportPhotoInput').onchange = e => {
            if (e.target.files[0]) {
                compressImage(e.target.files[0], base64 => {
                    document.getElementById('reportPreview').src = base64;
                    document.getElementById('reportPreview').classList.remove('hidden');
                });
            }
        };

        async function generateReport() {
            const b = document.getElementById('reportBarkod').value;
            const p = db[b];
            const n = parseFloat(document.getElementById('nSales').value) || 0;
            const i = parseFloat(document.getElementById('iSales').value) || 0;
            const repImg = document.getElementById('reportPreview').src;

            if(!p || !repImg.startsWith("data")) return alert("Hata: Ürün ve Teşhir Görseli eksik!");

            const pcn = n > 0 ? ((i - n) / n * 100).toFixed(0) : "100+";
            document.getElementById('pdf-date-cover').innerText = new Date().toLocaleDateString('tr-TR');
            document.getElementById('pdf-pName').innerText = p.n;
            document.getElementById('pdf-barkod').innerText = `BARKOD: ${b}`;
            document.getElementById('pdf-pPrice').innerText = `Normal Fiyat: ${p.p} TL`;
            document.getElementById('pdf-prod-image').src = p.img;
            document.getElementById('pdf-report-image').src = repImg;
            document.getElementById('pdf-ai-text').innerText = `${p.n} ürününde kampanya dönemi boyunca satışlar %${pcn} artış göstermiştir. Yapılan reyon çalışması ve fiyatlandırma verimliliği artırmıştır.`;

            const renderArea = document.getElementById('pdf-render-area');
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');

            const pages = renderArea.querySelectorAll('.pdf-page');
            for (let j = 0; j < pages.length; j++) {
                const canvas = await html2canvas(pages[j], { scale: 1.5, useCORS: true });
                const imgData = canvas.toDataURL('image/jpeg', 0.8);
                if (j > 0) pdf.addPage();
                pdf.addImage(imgData, 'JPEG', 0, 0, 210, 297);
            }
            pdf.save(`RAPOR_${p.n}.pdf`);
        }

        let html5QrCode;
        function toggleScanner() {
            const r = document.getElementById('reader');
            if (r.style.display === 'block') {
                html5QrCode.stop().then(() => r.style.display = 'none');
            } else {
                r.style.display = 'block';
                html5QrCode = new Html5Qrcode("reader");
                html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (txt) => {
                    if(document.getElementById('tab-kayit').classList.contains('hidden')) {
                        document.getElementById('reportBarkod').value = txt;
                        if(db[txt]) selectReportProduct(txt, db[txt]);
                    } else {
                        document.getElementById('regBarkod').value = txt;
                        if(db[txt]) fillRegForm(txt, db[txt]);
                    }
                    html5QrCode.stop().then(() => r.style.display = 'none');
                });
            }
        }
    </script>
</body>
</html>
