<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İNSERT ELİTE PRO v5.9</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; color: #1a1a1a; }
        .yakut-yesili { background-color: #004d40; }
        .nav-btn { flex: 1; padding: 16px; font-weight: 800; text-transform: uppercase; font-size: 0.6rem; }
        .active-tab { background: white; color: #E67E22; border-bottom: 4px solid #E67E22; }
        .pool-card { background: white; border-radius: 20px; padding: 12px; border: 1px solid #eee; margin-bottom: 12px; }
    </style>
</head>
<body>
    <div class="max-w-md mx-auto bg-white min-h-screen shadow-2xl flex flex-col relative">
        <div class="yakut-yesili p-6 text-white text-center rounded-b-[35px] shadow-xl">
            <h1 class="text-2xl font-black italic uppercase tracking-tighter">İnsert Elite Pro</h1>
            <p class="text-[9px] opacity-60 uppercase font-bold tracking-[3px]">Excel Master v5.9</p>
        </div>

        <div class="flex bg-gray-50 mx-4 -mt-5 rounded-xl shadow-md overflow-hidden z-50">
            <button onclick="showTab('kayit')" id="btn-kayit" class="nav-btn active-tab">📦 Portföy</button>
            <button onclick="showTab('analiz')" id="btn-analiz" class="nav-btn text-gray-400">📈 Analiz</button>
            <button onclick="showTab('liste'); loadPoolList();" id="btn-liste" class="nav-btn text-gray-400">📋 Havuz</button>
        </div>

        <div id="tab-kayit" class="p-6 space-y-4">
            <div class="bg-emerald-50 border-2 border-emerald-100 p-4 rounded-2xl">
                <p class="text-[10px] font-black text-emerald-800 uppercase mb-2">🚀 Toplu Liste Yükle (Excel)</p>
                <input type="file" id="excelInput" accept=".xlsx, .xls" class="hidden" onchange="importExcel(event)">
                <button onclick="document.getElementById('excelInput').click()" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold text-xs uppercase shadow-md">Listeyi Excel'den Al</button>
            </div>

            <div class="space-y-3 bg-white p-4 rounded-2xl border border-gray-100 shadow-sm">
                <input type="text" id="regBarkod" placeholder="Barkod No" class="w-full border-b-2 p-2 outline-none font-mono text-lg text-black">
                <input type="text" id="regName" placeholder="Ürün İsmi" class="w-full border-b-2 p-2 outline-none font-bold uppercase text-black">
                <input type="text" id="regPrice" placeholder="Normal Fiyat (₺)" class="w-full border-b-2 p-2 outline-none font-black text-emerald-700 text-black">
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="border-2 border-dashed border-gray-200 rounded-xl p-3 text-center bg-white min-h-[120px] flex flex-col items-center justify-center" onclick="document.getElementById('prodPhotoInput').click()">
                    <input type="file" id="prodPhotoInput" accept="image/*" class="hidden" onchange="compress(this.files[0], 'reg')">
                    <img id="regPreview" class="hidden w-full h-20 object-cover rounded-md mt-1">
                    <span class="text-[8px] font-bold text-gray-400 uppercase mt-1">Ürün Görseli</span>
                </div>
                <div class="border-2 border-dashed border-orange-200 rounded-xl p-3 text-center bg-orange-50/30 min-h-[120px] flex flex-col items-center justify-center" onclick="document.getElementById('preTesirInput').click()">
                    <input type="file" id="preTesirInput" accept="image/*" class="hidden" onchange="compress(this.files[0], 'pre')">
                    <img id="prePreview" class="hidden w-full h-20 object-cover rounded-md mt-1">
                    <span class="text-[8px] font-bold text-orange-400 uppercase mt-1">İşlem Görseli</span>
                </div>
            </div>
            <button onclick="saveProduct()" class="w-full bg-emerald-800 text-white py-4 rounded-xl font-black shadow-lg uppercase text-sm">Havuza Kaydet</button>
        </div>

        <div id="tab-analiz" class="hidden p-6 space-y-4 pb-24 text-black">
            <input type="text" id="smartSearch" onkeyup="filterProducts(this.value)" placeholder="Ürün Ara..." class="w-full bg-white border-2 border-gray-100 p-4 rounded-xl outline-none text-black font-bold">
            <div id="repResults" class="absolute top-full left-0 right-0 bg-white z-[100] rounded-xl shadow-2xl border hidden"></div>
            <div class="bg-slate-900 p-5 rounded-3xl shadow-lg border-r-[10px] border-orange-500 text-white">
                <input type="hidden" id="reportBarkod">
                <p id="dispName" class="font-black text-xl uppercase italic leading-tight text-white">Ürün Seçiniz</p>
                <p id="dispPrice" class="text-orange-400 font-bold text-[10px] mt-1 text-white">Fiyat Bekleniyor...</p>
            </div>
            <div class="grid grid-cols-2 gap-3 text-black">
                <input type="number" id="nSales" placeholder="Normal Satış" class="w-full border-2 p-4 rounded-xl text-center font-black text-xl text-black">
                <input type="number" id="iSales" placeholder="İnsert Satış" class="w-full border-2 border-orange-100 p-4 rounded-xl text-center font-black text-xl bg-orange-50 text-orange-700">
            </div>
            <button onclick="addToQueue()" class="w-full bg-slate-800 text-white py-4 rounded-xl font-black uppercase text-white">➕ Listeye Ekle</button>
            <div id="queueBar" class="fixed bottom-4 left-4 right-4 yakut-yesili p-4 rounded-2xl shadow-2xl flex justify-between items-center text-white transform translate-y-32 transition-all z-[100] border-2 border-orange-500 text-white">
                <div class="flex flex-col text-white"><span id="qCount" class="text-lg font-black text-white italic">0 Ürün</span><span class="text-[8px] font-bold uppercase text-white">Hazırlanıyor</span></div>
                <button onclick="finalizeAndPrint()" class="bg-orange-600 px-4 py-2 rounded-lg font-black text-[10px] text-white">PDF ÇIKART</button>
            </div>
        </div>

        <div id="tab-liste" class="hidden p-6 space-y-4 pb-24 text-black text-black">
            <div id="poolContainer" class="space-y-4"></div>
        </div>
    </div>

    <script>
        const db = new Dexie("InsertEliteDB");
        db.version(2).stores({ products: "barkod, n, p" });
        let reportQueue = []; let regB64 = ""; let preB64 = "";

        // EXCEL OKUMA FONKSİYONU
        function importExcel(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = async (event) => {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const jsonData = XLSX.utils.sheet_to_json(firstSheet);

                let addedCount = 0;
                for (let row of jsonData) {
                    // Excel sütun başlıklarını buraya göre eşleştiriyoruz (Sende neyse onu yazabilirsin)
                    const n = row["Ürün Adı"] || row["AD"];
                    const b = row["Barkod"] || row["BARKOD"];
                    const p = row["Eski Fiyat"] || row["NORMAL"];
                    
                    if(b && n && p) {
                        await db.products.put({ barkod: String(b), n: String(n), p: String(p), img: "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=" });
                        addedCount++;
                    }
                }
                alert(addedCount + " Ürün Havuza Aktarıldı! Şimdi görsellerini ekleyebilirsin.");
                location.reload();
            };
            reader.readAsArrayBuffer(file);
        }

        function showTab(tab) {
            ['kayit','analiz','liste'].forEach(t => document.getElementById('tab-'+t).classList.add('hidden'));
            document.getElementById('tab-'+tab).classList.remove('hidden');
            ['kayit','analiz','liste'].forEach(t => document.getElementById('btn-'+t).className = `nav-btn ${t===tab?'active-tab':'text-gray-400'}`);
        }

        async function saveProduct() {
            const b = document.getElementById('regBarkod').value.trim(); const n = document.getElementById('regName').value.trim(); const p = document.getElementById('regPrice').value.trim();
            if(!b || !n || !p || !regB64) return alert("Hata: Ürün bilgileri ve fotoğrafı zorunlu!");
            await db.products.put({ barkod: b, n, p, img: regB64, preImg: preB64 });
            alert("Kaydedildi!"); location.reload();
        }

        function compress(file, type) {
            if(!file) return;
            const reader = new FileReader(); reader.readAsDataURL(file);
            reader.onload = e => {
                const img = new Image(); img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas'); const MAX = 500;
                    const scale = MAX / img.width; canvas.width = MAX; canvas.height = img.height * scale;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    const b64 = canvas.toDataURL('image/jpeg', 0.6);
                    if(type === 'reg') { regB64 = b64; document.getElementById('regPreview').src = b64; document.getElementById('regPreview').classList.remove('hidden'); }
                    if(type === 'pre') { preB64 = b64; document.getElementById('prePreview').src = b64; document.getElementById('prePreview').classList.remove('hidden'); }
                };
            };
        }

        async function filterPool() {
            const container = document.getElementById('poolContainer'); container.innerHTML = '';
            let all = await db.products.toArray();
            all.forEach(p => {
                const div = document.createElement('div'); div.className = 'pool-card';
                div.innerHTML = `<h4 class="font-black text-xs uppercase italic">${p.n}</h4><p class="text-[8px] text-gray-400">${p.barkod}</p><div class="grid grid-cols-2 gap-2 mt-2"><img src="${p.img}" class="h-16 w-full object-cover rounded-lg border"></div>`;
                container.appendChild(div);
            });
        }
        function loadPoolList() { filterPool(); }
    </script>
</body>
</html>
