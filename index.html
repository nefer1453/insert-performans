<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İNSERT ELİTE PRO v5.9</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; color: #1a1a1a; }
        .yakut-yesili { background-color: #004d40; }
        .nav-btn { flex: 1; padding: 16px; font-weight: 800; text-transform: uppercase; font-size: 0.6rem; transition: 0.3s; }
        .active-tab { background: white; color: #E67E22; border-bottom: 4px solid #E67E22; }
        #reader { width: 100%; border-radius: 20px; overflow: hidden; display: none; border: 4px solid #004d40; }
        .pool-card { background: white; border-radius: 20px; padding: 12px; border: 1px solid #eee; margin-bottom: 12px; cursor: pointer; }
        #previewModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; align-items: center; justify-content: center; }
        #pdf-render-area { width: 794px; position: absolute; left: -9999px; top: 0; background: white; }
        .pdf-page { width: 794px; height: 1123px; padding: 50px; position: relative; box-sizing: border-box; background: white; display: flex; flex-direction: column; }
        .cover-page { background: #004d40; color: white; justify-content: center; align-items: center; text-align: center; }
        .data-row { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 8px 0; font-size: 14px; }
    </style>
</head>
<body>
    <div id="previewModal" onclick="this.style.display='none'"><img id="modalImg" class="max-w-[95%] max-h-[90vh] rounded-lg shadow-2xl"></div>

    <div class="max-w-md mx-auto bg-white min-h-screen shadow-2xl flex flex-col relative">
        <div class="yakut-yesili p-6 text-white text-center rounded-b-[35px] shadow-xl text-white">
            <h1 class="text-2xl font-black italic uppercase tracking-tighter text-white">İnsert Elite Pro</h1>
            <p class="text-[9px] opacity-60 uppercase font-bold tracking-[3px] text-white">Smart Search Sync v5.9</p>
        </div>

        <div class="flex bg-gray-50 mx-4 -mt-5 rounded-xl shadow-md overflow-hidden z-50">
            <button onclick="showTab('kayit')" id="btn-kayit" class="nav-btn active-tab">📦 Portföy</button>
            <button onclick="showTab('analiz')" id="btn-analiz" class="nav-btn text-gray-400">📈 Analiz</button>
            <button onclick="showTab('liste'); loadPoolList();" id="btn-liste" class="nav-btn text-gray-400">📋 Havuz</button>
        </div>

        <div id="scanner-section" class="px-6 pt-8">
            <div id="reader" class="mb-4"></div>
            <button onclick="toggleScanner()" class="w-full yakut-yesili text-white p-4 rounded-xl font-black shadow-lg uppercase italic flex items-center justify-center gap-2 text-sm text-white">📷 Barkod Oku</button>
        </div>

        <div id="tab-kayit" class="p-6 space-y-4">
            <div id="editBadge" class="hidden bg-orange-50 text-orange-600 p-2 rounded-lg text-center text-[9px] font-black uppercase italic border border-orange-100">Düzenleme Modu</div>
            <div class="space-y-3 bg-gray-50/50 p-4 rounded-2xl border border-gray-100">
                <input type="text" id="regBarkod" placeholder="Barkod No" class="w-full bg-transparent border-b-2 p-2 outline-none font-mono text-lg text-black">
                <input type="text" id="regName" placeholder="Ürün İsmi" class="w-full bg-transparent border-b-2 p-2 outline-none font-bold uppercase text-black">
                <input type="text" id="regPrice" placeholder="Fiyat (₺)" class="w-full bg-transparent border-b-2 p-2 outline-none font-black text-emerald-700 text-black">
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div class="border-2 border-dashed border-gray-200 rounded-xl p-3 text-center bg-white min-h-[120px] flex flex-col items-center justify-center cursor-pointer" onclick="document.getElementById('prodPhotoInput').click()">
                    <input type="file" id="prodPhotoInput" accept="image/*" class="hidden" onchange="compress(this.files[0], 'reg')">
                    <span id="regPrevIcon" class="text-xl">🖼️</span>
                    <img id="regPreview" class="hidden w-full h-20 object-cover rounded-md mt-1" onclick="openPreview(this.src, event)">
                    <span class="text-[8px] font-bold text-gray-400 uppercase mt-1 text-black">Ürün</span>
                </div>
                <div class="border-2 border-dashed border-orange-200 rounded-xl p-3 text-center bg-orange-50/30 min-h-[120px] flex flex-col items-center justify-center cursor-pointer" onclick="document.getElementById('preTesirInput').click()">
                    <input type="file" id="preTesirInput" accept="image/*" class="hidden" onchange="compress(this.files[0], 'pre')">
                    <span id="prePrevIcon" class="text-xl">📸</span>
                    <img id="prePreview" class="hidden w-full h-20 object-cover rounded-md mt-1" onclick="openPreview(this.src, event)">
                    <span class="text-[8px] font-bold text-orange-400 uppercase mt-1 text-black">Teşhir</span>
                </div>
            </div>
            <button onclick="saveProduct()" class="w-full bg-emerald-700 text-white py-4 rounded-xl font-black shadow-lg uppercase text-sm tracking-wider active:scale-95 transition-all text-white">Havuza Kaydet</button>
            <div class="flex gap-2">
                <button onclick="exportBackup()" class="flex-1 bg-gray-100 p-3 rounded-lg text-[9px] font-bold uppercase text-gray-600">💾 Yedekle</button>
                <button onclick="document.getElementById('importFile').click()" class="flex-1 bg-gray-100 p-3 rounded-lg text-[9px] font-bold uppercase text-gray-600">📥 Yükle</button>
                <input type="file" id="importFile" accept=".json" class="hidden" onchange="importBackup(event)">
            </div>
        </div>

        <div id="tab-analiz" class="hidden p-6 space-y-4 pb-24">
            <div class="relative">
                <input type="text" id="smartSearch" onkeyup="filterAnalysisProducts(this.value)" placeholder="Ürün İsmi veya Barkod..." class="w-full bg-white border-2 border-gray-100 p-4 rounded-xl outline-none focus:border-orange-500 font-bold text-sm shadow-sm text-black">
                <div id="repResults" class="absolute top-full left-0 right-0 bg-white z-[100] rounded-xl shadow-2xl border hidden max-h-60 overflow-y-auto"></div>
            </div>
            <div class="bg-slate-900 p-5 rounded-3xl shadow-lg border-r-[10px] border-orange-500 text-white">
                <input type="hidden" id="reportBarkod">
                <p id="dispName" class="font-black text-xl uppercase italic tracking-tight leading-tight text-white">Ürün Bekleniyor...</p>
                <p id="dispPrice" class="text-orange-400 font-bold text-[10px] mt-1 uppercase text-white">Fiyat...</p>
            </div>
            <div class="grid grid-cols-2 gap-3 text-black">
                <input type="number" id="nSales" placeholder="Normal" class="w-full border-2 p-4 rounded-xl text-center font-black text-xl bg-white shadow-inner outline-none text-black">
                <input type="number" id="iSales" placeholder="İnsert" class="w-full border-2 border-orange-100 p-4 rounded-xl text-center font-black text-xl bg-orange-50 text-orange-700 shadow-inner outline-none text-black">
            </div>
            <div class="border-2 border-dashed border-gray-100 rounded-2xl p-4 text-center bg-white cursor-pointer" onclick="document.getElementById('reportPhotoInput').click()">
                <input type="file" id="reportPhotoInput" accept="image/*" class="hidden" onchange="compress(this.files[0], 'repImg')">
                <span id="repLabel" class="text-[9px] font-black text-gray-400 uppercase text-black">📸 Teşhir Görseli Seç</span>
                <img id="reportPreview" class="hidden mt-2 w-full h-32 object-cover rounded-lg shadow-md" onclick="openPreview(this.src, event)">
            </div>
            <button onclick="addToQueue()" class="w-full bg-slate-800 text-white py-4 rounded-xl font-black shadow-lg uppercase italic tracking-widest text-sm text-white">➕ Listeye Ekle</button>
            <div id="queueBar" class="fixed bottom-4 left-4 right-4 yakut-yesili p-4 rounded-2xl shadow-2xl flex justify-between items-center text-white transform translate-y-32 transition-all z-[100] border-2 border-orange-500">
                <div class="flex flex-col text-white"><span id="qCount" class="text-lg font-black italic text-white">0 Ürün</span><span class="text-[8px] font-bold uppercase opacity-70 text-white">Analiz Listesi</span></div>
                <button onclick="finalizeAndPrint()" class="bg-orange-600 px-4 py-2 rounded-lg font-black uppercase text-[10px] shadow-lg text-white">PDF AL 📄</button>
            </div>
        </div>

        <div id="tab-liste" class="hidden p-6 space-y-4 pb-24 text-black">
            <input type="text" id="poolSearch" onkeyup="filterPool(this.value)" placeholder="Akıllı Arama..." class="w-full bg-white border-2 border-emerald-50 p-4 rounded-xl outline-none font-bold text-xs shadow-sm focus:border-emerald-600 text-black">
            <div id="poolContainer" class="space-y-4 text-black text-black"></div>
        </div>
    </div>

    <div id="pdf-render-area">
        <div id="pdf-cover" class="pdf-page cover-page">
            <div style="border: 15px solid #E67E22; padding: 60px; width: 85%;">
                <h1 style="font-size: 50px; font-weight: 900; color: white; margin: 0; line-height: 1.1; text-transform: uppercase;">İNSERT<br>PERFORMANS<br>RAPORU</h1>
            </div>
            <div style="margin-top: 50px; text-align: center; width: 100%;">
                <p id="pdf-date-cover" style="font-size: 28px; font-weight: 700; color: white;"></p>
                <p style="text-transform: uppercase; letter-spacing: 8px; color: #E67E22; font-weight: 900; font-size: 14px;">ŞUBE: SOĞANLIK 2</p>
            </div>
        </div>
        <div id="pdf-pages-container"></div>
    </div>

    <script>
        const db = new Dexie("InsertEliteDB");
        db.version(2).stores({ products: "barkod, n, p" });
        let reportQueue = []; let regB64 = ""; let preB64 = ""; let html5QrCode; const beep = new Audio('https://www.soundjay.com/buttons/beep-07.mp3');

        function openPreview(src, e) { e.stopPropagation(); document.getElementById('modalImg').src = src; document.getElementById('previewModal').style.display = 'flex'; }
        function showTab(tab) {
            ['kayit','analiz','liste'].forEach(t => document.getElementById('tab-'+t).classList.add('hidden'));
            document.getElementById('tab-'+tab).classList.remove('hidden');
            ['kayit','analiz','liste'].forEach(t => document.getElementById('btn-'+t).className = `nav-btn ${t===tab?'active-tab':'text-gray-400'}`);
            document.getElementById('scanner-section').style.display = tab === 'liste' ? 'none' : 'block';
        }

        // AKILLI ANALİZ ARAMASI (GÜNCELLENDİ)
        async function filterAnalysisProducts(val) {
            const res = document.getElementById('repResults'); res.innerHTML = '';
            if (val.length < 1) { res.classList.add('hidden'); return; }
            const all = await db.products.toArray();
            const matches = all.filter(p => 
                p.n.toLowerCase().includes(val.toLowerCase()) || 
                p.barkod.includes(val) ||
                p.n.substring(0,3).toLowerCase().includes(val.toLowerCase()) // İlk 3 harf desteği
            );
            
            if (matches.length > 0) {
                matches.forEach(p => {
                    const div = document.createElement('div');
                    div.className = 'p-3 border-b text-xs font-bold uppercase hover:bg-orange-50 cursor-pointer flex items-center gap-3 text-black';
                    div.innerHTML = `<img src="${p.img}" class="w-8 h-8 rounded object-cover"> <div>${p.n} <br> <span class="text-[8px] opacity-40">${p.barkod}</span></div>`;
                    div.onclick = () => {
                        document.getElementById('reportBarkod').value = p.barkod;
                        document.getElementById('smartSearch').value = p.n;
                        document.getElementById('dispName').innerText = p.n;
                        document.getElementById('dispPrice').innerText = `Normal Fiyat: ${p.p} ₺`;
                        if(p.preImg) {
                            document.getElementById('reportPreview').src = p.preImg;
                            document.getElementById('reportPreview').classList.remove('hidden');
                            document.getElementById('repLabel').classList.add('hidden');
                        } else {
                            document.getElementById('reportPreview').classList.add('hidden');
                            document.getElementById('repLabel').classList.remove('hidden');
                        }
                        res.classList.add('hidden');
                    };
                    res.appendChild(div);
                });
                res.classList.remove('hidden');
            } else res.classList.add('hidden');
        }

        async function filterPool(val) {
            const container = document.getElementById('poolContainer'); container.innerHTML = '';
            let all = await db.products.toArray();
            let filtered = val.length >= 1 ? all.filter(p => p.n.toLowerCase().includes(val.toLowerCase()) || p.barkod.includes(val)) : all;
            filtered.forEach(p => {
                const div = document.createElement('div'); div.className = 'pool-card'; div.onclick = (e) => { if(!e.target.closest('button')) editProduct(p.barkod); };
                div.innerHTML = `<div class="flex justify-between items-start mb-2"><div class="flex-1 text-black"><h4 class="font-black text-xs uppercase italic">${p.n}</h4><p class="text-[8px] text-gray-400 font-mono">${p.barkod}</p></div><span class="text-xs font-black text-emerald-700">${p.p} ₺</span></div><div class="grid grid-cols-2 gap-2"><img src="${p.img}" class="h-20 w-full object-cover rounded-lg border" onclick="openPreview(this.src, event)">${p.preImg ? `<img src="${p.preImg}" class="h-20 w-full object-cover rounded-lg border border-orange-100" onclick="openPreview(this.src, event)">` : `<div class="h-20 bg-gray-50 rounded-lg border-2 border-dashed flex items-center justify-center text-[7px] text-gray-300 font-bold uppercase">Foto Yok</div>`}</div><div class="flex justify-end mt-2"><button onclick="event.stopPropagation(); deleteProduct('${p.barkod}')" class="text-red-500 font-bold text-[9px] uppercase">Sil 🗑️</button></div>`;
                container.appendChild(div);
            });
        }

        async function editProduct(barkod) {
            const p = await db.products.get(barkod); if(!p) return;
            showTab('kayit'); document.getElementById('regBarkod').value = p.barkod; document.getElementById('regName').value = p.n; document.getElementById('regPrice').value = p.p;
            regB64 = p.img; document.getElementById('regPreview').src = p.img; document.getElementById('regPreview').classList.remove('hidden'); document.getElementById('regPrevIcon').classList.add('hidden');
            if(p.preImg) { preB64 = p.preImg; document.getElementById('prePreview').src = p.preImg; document.getElementById('prePreview').classList.remove('hidden'); document.getElementById('prePrevIcon').classList.add('hidden'); }
            else { preB64 = ""; document.getElementById('prePreview').classList.add('hidden'); document.getElementById('prePrevIcon').classList.remove('hidden'); }
            document.getElementById('editBadge').classList.remove('hidden');
        }

        async function saveProduct() {
            const b = document.getElementById('regBarkod').value.trim(); const n = document.getElementById('regName').value.trim(); const p = document.getElementById('regPrice').value.trim();
            if(!b || !n || !p || !regB64) return alert("Eksik veri!");
            await db.products.put({ barkod: b, n, p, img: regB64, preImg: preB64 });
            alert("Kaydedildi!"); location.reload();
        }

        async function deleteProduct(barkod) { if(confirm("Silinsin mi?")) { await db.products.delete(barkod); loadPoolList(); } }

        function compress(file, type) {
            if(!file) return;
            const reader = new FileReader(); reader.readAsDataURL(file);
            reader.onload = e => {
                const img = new Image(); img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas'); const MAX = 500;
                    const scale = MAX / img.width; canvas.width = MAX; canvas.height = img.height * scale;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    const b64 = canvas.toDataURL('image/jpeg', 0.6);
                    if(type === 'reg') { regB64 = b64; document.getElementById('regPreview').src = b64; document.getElementById('regPreview').classList.remove('hidden'); document.getElementById('regPrevIcon').classList.add('hidden'); }
                    if(type === 'pre') { preB64 = b64; document.getElementById('prePreview').src = b64; document.getElementById('prePreview').classList.remove('hidden'); document.getElementById('prePrevIcon').classList.add('hidden'); }
                    if(type === 'repImg') { document.getElementById('reportPreview').src = b64; document.getElementById('reportPreview').classList.remove('hidden'); document.getElementById('repLabel').classList.add('hidden'); }
                };
            };
        }

        async function exportBackup() {
            const all = await db.products.toArray();
            const blob = new Blob([JSON.stringify(all)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `Soganlik2_Yedek.json`;
            a.click();
        }

        async function importBackup(e) {
            const file = e.target.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = async (ev) => {
                await db.products.bulkPut(JSON.parse(ev.target.result));
                alert("Yedek Yüklendi!"); location.reload();
            };
            reader.readAsText(file);
        }

        function addToQueue() {
            const b = document.getElementById('reportBarkod').value; const n = parseFloat(document.getElementById('nSales').value) || 0; const i = parseFloat(document.getElementById('iSales').value) || 0; const img = document.getElementById('reportPreview').src;
            db.products.get(b).then(p => {
                if(!p || !img.startsWith("data")) return alert("Hata: Ürün ve Fotoğraf zorunlu!");
                reportQueue.push({ barkod: b, info: p, normal: n, insert: i, img });
                document.getElementById('qCount').innerText = `${reportQueue.length} Ürün`;
                document.getElementById('queueBar').style.transform = "translateY(0)";
                document.getElementById('smartSearch').value = ''; document.getElementById('nSales').value = ''; document.getElementById('iSales').value = '';
                document.getElementById('reportPreview').classList.add('hidden'); document.getElementById('repLabel').classList.remove('hidden');
                document.getElementById('dispName').innerText = "Sıradaki?"; beep.play();
                setTimeout(toggleScanner, 500);
            });
        }

        async function finalizeAndPrint() {
            const { jsPDF } = window.jspdf; const pdf = new jsPDF('p', 'mm', 'a4');
            const container = document.getElementById('pdf-pages-container');
            document.getElementById('pdf-date-cover').innerText = new Date().toLocaleDateString('tr-TR');
            const coverCanvas = await html2canvas(document.getElementById('pdf-cover'), { scale: 1.5 });
            pdf.addImage(coverCanvas.toDataURL('image/jpeg', 0.8), 'JPEG', 0, 0, 210, 297);
            for (let item of reportQueue) {
                const pcn = item.normal > 0 ? ((item.insert - item.normal) / item.normal * 100).toFixed(0) : "100+";
                const pageHTML = `<div class="pdf-page"><div style="display: flex; gap: 40px; height: 100%;"><div style="flex: 1.1; display: flex; flex-direction: column;"><div style="background: #f8fafc; border: 4px solid #f1f5f9; border-radius: 40px; padding: 35px; flex-grow: 1; display: flex; flex-direction: column;"><div style="height: 550px; background: white; border-radius: 25px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid #eee;"><img src="${item.info.img}" style="max-width: 95%; max-height: 95%; object-fit: contain;"></div><div style="margin-top: 30px;"><h2 style="font-size: 34px; font-weight: 900; color: #004d40; margin: 0; text-transform: uppercase;">${item.info.n}</h2><div style="height: 6px; background: #E67E22; width: 70px; margin: 15px 0;"></div><div style="background: white; border-radius: 20px; padding: 20px; border: 1px solid #e2e8f0;"><div class="data-row"><span>Barkod</span><span style="font-weight: 900;">${item.barkod}</span></div><div class="data-row"><span>Birim Fiyat</span><span style="font-weight: 900; color:#004d40;">${item.info.p} TL</span></div><div class="data-row"><span>Normal Satış</span><span style="font-weight: 900;">${item.normal} Adet</span></div><div class="data-row"><span>İnsert Satış</span><span style="font-weight: 900; color:#E67E22;">${item.insert} Adet</span></div></div></div></div></div><div style="flex: 0.9; display: flex; flex-direction: column; gap: 20px;"><div style="background: #004d40; color: white; border-radius: 30px; padding: 25px; text-align: center;"><p style="font-size: 10px; opacity: 0.6; text-transform: uppercase;">STRATEJİ</p><h2 style="font-size: 20px; font-weight: 900;">İNSERT UYGULAMASI</h2></div><div style="position: relative; height: 380px;"><img src="${item.img}" style="width: 100%; height: 100%; object-fit: cover; border-radius: 30px;"><div style="position: absolute; top: 20px; right: 20px; background: #E67E22; color: white; padding: 12px 24px; border-radius: 15px; font-weight: 900; font-size: 30px;">%${pcn}</div></div><div style="background: #f0fdf4; border: 4px solid #dcfce7; border-radius: 35px; padding: 30px; flex-grow: 1;"><h4 style="color: #004d40; font-weight: 900; font-size: 11px; letter-spacing: 2px;">ANALİZ</h4><p style="font-size: 19px; color: #064e3b; font-weight: 700; font-style: italic; line-height: 1.4; margin-top: 15px;">${item.info.n} ürününde elde edilen %${pcn} büyüme oranı, uygulanan stratejinin başarısını kanıtlamaktadır.</p></div></div></div></div>`;
                container.innerHTML = pageHTML;
                const pageCanvas = await html2canvas(container.firstElementChild, { scale: 1.5 });
                pdf.addPage(); pdf.addImage(pageCanvas.toDataURL('image/jpeg', 0.8), 'JPEG', 0, 0, 210, 297);
            }
            pdf.save(`İNSERT_ELİTE_RAPORU.pdf`); location.reload();
        }

        function toggleScanner() {
            const r = document.getElementById('reader');
            if (r.style.display === 'block') { html5QrCode.stop().then(() => r.style.display = 'none'); }
            else {
                r.style.display = 'block';
                html5QrCode = new Html5Qrcode("reader");
                html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, (txt) => {
                    beep.play();
                    if(!document.getElementById('tab-kayit').classList.contains('hidden')) {
                        document.getElementById('regBarkod').value = txt; db.products.get(txt).then(p => { if(p) editProduct(txt); });
                    } else {
                        document.getElementById('reportBarkod').value = txt; db.products.get(txt).then(p => { if(p) { 
                            document.getElementById('smartSearch').value = p.n; document.getElementById('dispName').innerText = p.n; document.getElementById('dispPrice').innerText = `Normal: ${p.p} ₺`;
                            if(p.preImg) { document.getElementById('reportPreview').src = p.preImg; document.getElementById('reportPreview').classList.remove('hidden'); document.getElementById('repLabel').classList.add('hidden'); }
                        } });
                    }
                    html5QrCode.stop().then(() => r.style.display = 'none');
                });
            }
        }
    </script>
</body>
</html>
