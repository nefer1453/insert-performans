<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İNSERT ELİTE PRO v5.4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; color: #1a1a1a; }
        .yakut-yesili { background-color: #004d40; }
        .turuncu { background-color: #E67E22; }
        .nav-btn { flex: 1; padding: 18px; font-weight: 800; text-transform: uppercase; font-size: 0.65rem; transition: 0.4s; }
        .active-tab { background: white; color: #E67E22; border-bottom: 5px solid #E67E22; }
        #reader { width: 100%; border-radius: 25px; overflow: hidden; display: none; border: 5px solid #004d40; margin-bottom: 15px; }
        #pdf-render-area { width: 794px; position: absolute; left: -9999px; top: 0; background: white; }
        .pdf-page { width: 794px; height: 1123px; padding: 60px; position: relative; box-sizing: border-box; background: white; }
        .cover-page { background: linear-gradient(135deg, #002d26 0%, #004d40 100%); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .pool-card { background: white; border-radius: 20px; padding: 12px; display: flex; align-items: center; gap: 15px; border: 1px solid #eee; margin-bottom: 10px; cursor: pointer; position: relative; }
    </style>
</head>
<body>
    <div class="max-w-md mx-auto bg-white min-h-screen shadow-2xl flex flex-col relative text-black text-black">
        <div class="yakut-yesili p-8 text-white text-center rounded-b-[40px] shadow-2xl">
            <h1 class="text-3xl font-black italic uppercase tracking-tighter text-white">İnsert Elite Pro</h1>
            <p class="text-[10px] opacity-60 uppercase font-bold tracking-[4px] mt-1 text-white">Elite v5.4 - Fix</p>
        </div>

        <div class="flex bg-gray-100/50 backdrop-blur-md mx-6 -mt-6 rounded-2xl shadow-lg overflow-hidden z-50 text-white text-white">
            <button onclick="showTab('kayit')" id="btn-kayit" class="nav-btn active-tab">📦 Portföy</button>
            <button onclick="showTab('analiz')" id="btn-analiz" class="nav-btn text-gray-400">📈 Analiz</button>
            <button onclick="showTab('liste'); loadPoolList();" id="btn-liste" class="nav-btn text-gray-400">📋 Havuz</button>
        </div>

        <div id="scanner-section" class="px-6 pt-10">
            <div id="reader"></div>
            <button onclick="toggleScanner()" class="w-full yakut-yesili text-white p-5 rounded-2xl font-black shadow-xl uppercase italic flex items-center justify-center gap-3">📷 Barkodu Tara</button>
        </div>

        <div id="tab-kayit" class="p-6 space-y-4 pt-4">
            <div id="editBadge" class="hidden bg-orange-100 text-orange-700 p-2 rounded-xl text-center text-[10px] font-black uppercase">⚠️ DÜZENLEME MODU AKTİF</div>
            <div class="bg-white p-5 rounded-[30px] border-2 border-gray-100 space-y-4 shadow-sm text-black text-black">
                <input type="text" id="regBarkod" placeholder="Barkod *" class="w-full border-b-2 p-2 outline-none font-mono text-xl focus:border-emerald-700 text-black">
                <input type="text" id="regName" placeholder="Ürün Adı *" class="w-full border-b-2 p-2 outline-none font-bold text-lg focus:border-emerald-700 uppercase text-black">
                <input type="text" id="regPrice" placeholder="Birim Fiyat (₺) *" class="w-full border-b-2 p-2 outline-none font-black focus:border-emerald-700 text-black">
            </div>
            
            <div class="grid grid-cols-2 gap-3">
                <div class="border-2 border-dashed border-gray-200 rounded-2xl p-4 text-center bg-gray-50 flex flex-col items-center justify-center min-h-[140px]">
                    <input type="file" id="prodPhotoInput" accept="image/*" class="hidden">
                    <label for="prodPhotoInput" class="cursor-pointer">
                        <span class="text-2xl mb-1 block">🖼️</span>
                        <span class="text-[9px] font-black text-gray-400 uppercase">Ürün Görseli</span>
                    </label>
                    <img id="regPreview" class="hidden mt-2 w-full h-20 object-cover rounded-lg border-2 border-white">
                </div>
                <div class="border-2 border-dashed border-orange-200 rounded-2xl p-4 text-center bg-orange-50 flex flex-col items-center justify-center min-h-[140px]">
                    <input type="file" id="preTesirInput" accept="image/*" class="hidden">
                    <label for="preTesirInput" class="cursor-pointer">
                        <span class="text-2xl mb-1 block text-black">📸</span>
                        <span class="text-[9px] font-black text-orange-400 uppercase text-black">Yaptığım İşlem</span>
                    </label>
                    <img id="prePreview" class="hidden mt-2 w-full h-20 object-cover rounded-lg border-2 border-white">
                </div>
            </div>
            <button onclick="saveProduct()" class="w-full bg-emerald-800 text-white py-5 rounded-[25px] font-black shadow-2xl uppercase tracking-widest active:scale-95 transition-all text-white">Havuza Kaydet / Güncelle</button>
        </div>

        <div id="tab-analiz" class="hidden p-6 space-y-5 pt-4 pb-24 text-black text-black">
            <input type="text" id="smartSearch" onkeyup="filterProducts(this.value, 'rep')" placeholder="Havuzdan Ürün Seç..." class="w-full bg-white border-2 border-gray-100 p-4 rounded-2xl outline-none focus:border-orange-500 font-bold text-sm text-black">
            <div id="repResults" class="absolute top-full left-0 right-0 bg-white z-[100] rounded-xl shadow-2xl border hidden text-black"></div>
            <div class="bg-gray-900 p-6 rounded-[35px] shadow-2xl border-r-[12px] border-orange-600 relative overflow-hidden text-white">
                <input type="hidden" id="reportBarkod">
                <p id="dispName" class="text-white font-black text-2xl uppercase italic tracking-tighter leading-tight text-white">Ürün Seçiniz</p>
                <p id="dispPrice" class="text-orange-500 font-bold uppercase text-xs mt-2 tracking-widest text-white">Normal: 0.00 ₺</p>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <input type="number" id="nSales" placeholder="Normal Satış" class="border-2 border-gray-100 p-5 rounded-3xl text-center font-black text-2xl bg-white outline-none text-black">
                <input type="number" id="iSales" placeholder="İnsert Satış" class="border-2 border-orange-200 p-5 rounded-3xl text-center font-black text-2xl bg-orange-50 text-orange-700 outline-none text-black">
            </div>
            <div class="border-4 border-dashed border-gray-100 rounded-[30px] p-6 text-center bg-white relative">
                <input type="file" id="reportPhotoInput" accept="image/*" class="hidden">
                <label for="reportPhotoInput" class="cursor-pointer text-black">
                    <span id="repLabel" class="text-[10px] font-black text-gray-400 uppercase italic">📸 Teşhir Görseli</span>
                </label>
                <img id="reportPreview" class="hidden mt-4 w-full h-44 object-cover rounded-2xl shadow-xl border-4 border-white">
            </div>
            <button onclick="addToReportQueue()" class="w-full bg-gray-800 text-white py-5 rounded-[25px] font-black shadow-2xl uppercase tracking-widest active:scale-95 transition-all text-white"><span>➕</span> Listeye Ekle</button>
            <div id="reportQueueBar" class="fixed bottom-6 left-6 right-6 yakut-yesili p-4 rounded-[30px] shadow-2xl flex justify-between items-center text-white transform translate-y-32 transition-all duration-500 z-[100] border-2 border-orange-500">
                <div class="flex flex-col text-white text-white text-white"><span id="queueCount" class="text-xl font-black italic">0 Ürün</span><span class="text-[10px] font-bold uppercase opacity-70 tracking-widest text-white text-white">Analiz Listesi</span></div>
                <button onclick="finalizeAndPrint()" class="bg-orange-600 text-white px-6 py-3 rounded-2xl font-black uppercase text-xs shadow-lg active:scale-90 transition-all italic text-white text-white">Raporu Al 📄</button>
            </div>
        </div>

        <div id="tab-liste" class="hidden p-6 space-y-4 pt-4 pb-24 text-black text-black">
            <input type="text" id="poolSearch" onkeyup="filterPool(this.value)" placeholder="Ara (İsim / Barkod)..." class="w-full bg-white border-2 border-emerald-100 p-4 rounded-2xl outline-none font-bold text-sm shadow-sm text-black">
            <div id="poolContainer" class="space-y-3 text-black"></div>
        </div>
    </div>

    <div id="pdf-render-area">
        <div id="pdf-cover" class="pdf-page cover-page">
            <div style="border: 15px solid #E67E22; padding: 60px; width: 85%;">
                <h1 style="font-size: 60px; font-weight: 900; letter-spacing: -2px; margin: 0; line-height: 1.1; color: white;">İNSERT<br>PERFORMANS<br>RAPORU</h1>
                <div style="height: 8px; background: #E67E22; width: 120px; margin: 40px 0;"></div>
            </div>
            <div style="position: absolute; bottom: 100px; text-align: center; width: 100%;">
                <p id="pdf-date-cover" style="font-size: 28px; font-weight: 700; color: white;"></p>
                <p style="text-transform: uppercase; letter-spacing: 8px; color: #E67E22; font-weight: 900; font-size: 14px;">ŞUBE: SOĞANLIK 2</p>
            </div>
        </div>
        <div id="pdf-pages-container"></div>
    </div>

    <script>
        const db = new Dexie("InsertEliteDB");
        db.version(2).stores({ products: "barkod, n, p" });
        let reportQueue = []; let regPhotoBase64 = ""; let preTesirBase64 = ""; let html5QrCode; const beep = new Audio('https://www.soundjay.com/buttons/beep-07.mp3');

        function showTab(tab) {
            document.getElementById('tab-kayit').classList.toggle('hidden', tab !== 'kayit');
            document.getElementById('tab-analiz').classList.toggle('hidden', tab !== 'analiz');
            document.getElementById('tab-liste').classList.toggle('hidden', tab !== 'liste');
            document.getElementById('btn-kayit').className = `nav-btn ${tab === 'kayit' ? 'active-tab' : 'text-gray-400'}`;
            document.getElementById('btn-analiz').className = `nav-btn ${tab === 'analiz' ? 'active-tab' : 'text-gray-400'}`;
            document.getElementById('btn-liste').className = `nav-btn ${tab === 'liste' ? 'active-tab' : 'text-gray-400'}`;
            document.getElementById('scanner-section').style.display = tab === 'liste' ? 'none' : 'block';
        }

        async function editProduct(barkod) {
            const p = await db.products.get(barkod);
            if(p) {
                showTab('kayit');
                document.getElementById('regBarkod').value = p.barkod;
                document.getElementById('regName').value = p.n;
                document.getElementById('regPrice').value = p.p;
                regPhotoBase64 = p.img;
                document.getElementById('regPreview').src = p.img;
                document.getElementById('regPreview').classList.remove('hidden');
                if(p.preImg) {
                    preTesirBase64 = p.preImg;
                    document.getElementById('prePreview').src = p.preImg;
                    document.getElementById('prePreview').classList.remove('hidden');
                } else { preTesirBase64 = ""; document.getElementById('prePreview').classList.add('hidden'); }
                document.getElementById('editBadge').classList.remove('hidden');
            }
        }

        // SİLME FONKSİYONU (DÜZELTİLDİ)
        async function deleteProduct(barkod) {
            if(confirm("Bu ürünü silmek istediğine emin misin?")) {
                await db.products.delete(barkod);
                loadPoolList(); 
            }
        }

        async function filterPool(val) {
            const container = document.getElementById('poolContainer'); container.innerHTML = '';
            let all = await db.products.toArray();
            let filtered = val.length >= 3 ? all.filter(p => p.n.toLowerCase().includes(val.toLowerCase()) || p.barkod.includes(val)) : all;
            filtered.forEach(p => {
                const div = document.createElement('div'); div.className = 'pool-card';
                div.onclick = (e) => {
                    // Eğer silme butonuna basılmadıysa düzenleme moduna geç
                    if(!e.target.closest('button')) editProduct(p.barkod);
                };
                div.innerHTML = `
                    <img src="${p.img}" class="w-16 h-16 rounded-xl object-cover border">
                    <div class="flex-1">
                        <h4 class="font-black text-sm uppercase italic">${p.n}</h4>
                        <div class="flex justify-between items-center mt-1">
                            <span class="text-[10px] text-gray-400">${p.barkod}</span>
                            <span class="text-xs font-black text-emerald-700">${p.p} ₺</span>
                        </div>
                    </div>
                    <button onclick="deleteProduct('${p.barkod}')" class="p-3 text-red-500 hover:text-red-700 text-xl">🗑️</button>
                `;
                container.appendChild(div);
            });
        }

        async function loadPoolList() { filterPool(''); }

        async function saveProduct() {
            const b = document.getElementById('regBarkod').value.trim(); const n = document.getElementById('regName').value.trim(); const p = document.getElementById('regPrice').value.trim();
            if(!b || !n || !p || !regPhotoBase64) return alert("Eksik veri!");
            await db.products.put({ barkod: b, n, p, img: regPhotoBase64, preImg: preTesirBase64 });
            alert("Havuz Güncellendi! ✅"); location.reload();
        }

        function compress(file, cb) {
            const reader = new FileReader(); reader.readAsDataURL(file);
            reader.onload = e => {
                const img = new Image(); img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas'); const MAX = 500;
                    const scale = MAX / img.width; canvas.width = MAX; canvas.height = img.height * scale;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    cb(canvas.toDataURL('image/jpeg', 0.6));
                };
            };
        }

        document.getElementById('prodPhotoInput').onchange = e => compress(e.target.files[0], b => { regPhotoBase64 = b; document.getElementById('regPreview').src = b; document.getElementById('regPreview').classList.remove('hidden'); });
        document.getElementById('preTesirInput').onchange = e => compress(e.target.files[0], b => { preTesirBase64 = b; document.getElementById('prePreview').src = b; document.getElementById('prePreview').classList.remove('hidden'); });
        document.getElementById('reportPhotoInput').onchange = e => compress(e.target.files[0], b => { document.getElementById('reportPreview').src = b; document.getElementById('reportPreview').classList.remove('hidden'); });

        async function filterProducts(val, screen) {
            const resDiv = document.getElementById('repResults'); resDiv.innerHTML = '';
            if (val.length < 1) { resDiv.classList.add('hidden'); return; }
            const matches = await db.products.filter(p => p.n.toLowerCase().includes(val.toLowerCase()) || p.barkod.includes(val)).toArray();
            if (matches.length > 0) {
                matches.forEach(p => {
                    const div = document.createElement('div'); div.className = 'p-3 border-b font-bold text-sm cursor-pointer hover:bg-orange-50';
                    div.innerText = p.n;
                    div.onclick = () => {
                        document.getElementById('reportBarkod').value = p.barkod;
                        document.getElementById('smartSearch').value = p.n;
                        document.getElementById('dispName').innerText = p.n;
                        document.getElementById('dispPrice').innerText = `Normal: ${p.p} ₺`;
                        if(p.preImg) {
                            document.getElementById('reportPreview').src = p.preImg;
                            document.getElementById('reportPreview').classList.remove('hidden');
                            document.getElementById('repLabel').innerText = "Önceden Kaydedilen Görsel Yüklendi ✅";
                        } else { document.getElementById('reportPreview').classList.add('hidden'); document.getElementById('repLabel').innerText = "📸 Teşhir Görseli"; }
                        resDiv.classList.add('hidden');
                    };
                    resDiv.appendChild(div);
                });
                resDiv.classList.remove('hidden');
            }
        }

        function addToReportQueue() {
            const b = document.getElementById('reportBarkod').value; const n = parseFloat(document.getElementById('nSales').value) || 0; const i = parseFloat(document.getElementById('iSales').value) || 0; const repImg = document.getElementById('reportPreview').src;
            db.products.get(b).then(p => {
                if(!p || !repImg.startsWith("data")) return alert("Hata: Ürün ve Teşhir Görseli eksik!");
                reportQueue.push({ barkod: b, info: p, normal: n, insert: i, action: "İNSERT UYGULAMASI", img: repImg });
                document.getElementById('queueCount').innerText = `${reportQueue.length} Ürün`;
                document.getElementById('reportQueueBar').style.transform = "translateY(0)";
                document.getElementById('smartSearch').value = ''; document.getElementById('nSales').value = ''; document.getElementById('iSales').value = '';
                document.getElementById('reportPreview').classList.add('hidden'); beep.play();
            });
        }

        async function finalizeAndPrint() {
            const { jsPDF } = window.jspdf; const pdf = new jsPDF('p', 'mm', 'a4');
            const container = document.getElementById('pdf-pages-container');
            document.getElementById('pdf-date-cover').innerText = new Date().toLocaleDateString('tr-TR');
            const coverCanvas = await html2canvas(document.getElementById('pdf-cover'), { scale: 1.5 });
            pdf.addImage(coverCanvas.toDataURL('image/jpeg', 0.8), 'JPEG', 0, 0, 210, 297);
            for (let item of reportQueue) {
                const pcn = item.normal > 0 ? ((item.insert - item.normal) / item.normal * 100).toFixed(0) : "100+";
                const pageHTML = `<div class="pdf-page"><div style="display: flex; gap: 40px; height: 100%;"><div style="flex: 1.1; display: flex; flex-direction: column;"><div style="background: #f8fafc; border: 4px solid #f1f5f9; border-radius: 40px; padding: 35px; flex-grow: 1;"><div style="height: 600px; background: white; border-radius: 25px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid #eee;"><img src="${item.info.img}" style="max-width: 95%; max-height: 95%; object-fit: contain;"></div><div style="margin-top: 40px;"><h2 style="font-size: 38px; font-weight: 900; color: #004d40; margin: 0; text-transform: uppercase;">${item.info.n}</h2><div style="height: 6px; background: #E67E22; width: 70px; margin: 20px 0;"></div><p style="font-size: 16px; color: #64748b; font-weight: 800;">SKU: ${item.barkod}</p><p style="font-size: 22px; color: #004d40; font-weight: 900; margin-top: 10px;">Fiyat: ${item.info.p} TL</p></div></div></div><div style="flex: 0.9; display: flex; flex-direction: column; gap: 20px;"><div style="background: #004d40; color: white; border-radius: 30px; padding: 25px; text-align: center;"><p style="font-size: 10px; opacity: 0.6; text-transform: uppercase;">STRATEJİ</p><h2 style="font-size: 20px; font-weight: 900;">İNSERT UYGULAMASI</h2></div><div style="position: relative; height: 350px;"><img src="${item.img}" style="width: 100%; height: 100%; object-fit: cover; border-radius: 30px;"><div style="position: absolute; top: 20px; right: 20px; background: #E67E22; color: white; padding: 10px 20px; border-radius: 15px; font-weight: 900; font-size: 24px;">%${pcn}</div></div><div style="background: #f0fdf4; border: 4px solid #dcfce7; border-radius: 35px; padding: 30px; flex-grow: 1;"><h4 style="color: #004d40; font-weight: 900; font-size: 11px; letter-spacing: 2px;">PERFORMANS ANALİZİ</h4><p style="font-size: 18px; color: #064e3b; font-weight: 700; font-style: italic; line-height: 1.4;">${item.info.n} ürününde %${pcn} büyüme ile kampanya başarısı tescillenmiştir.</p></div></div></div></div>`;
                container.innerHTML = pageHTML;
                const pageCanvas = await html2canvas(container.firstElementChild, { scale: 1.5 });
                pdf.addPage(); pdf.addImage(pageCanvas.toDataURL('image/jpeg', 0.8), 'JPEG', 0, 0, 210, 297);
            }
            pdf.save(`İNSERT_ELİTE_RAPORU.pdf`); location.reload();
        }

        function toggleScanner() {
            const r = document.getElementById('reader');
            if (r.style.display === 'block') { html5QrCode.stop().then(() => r.style.display = 'none'); }
            else {
                r.style.display = 'block';
                html5QrCode = new Html5Qrcode("reader");
                html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (txt) => {
                    beep.play();
                    if(!document.getElementById('tab-kayit').classList.contains('hidden')) {
                        document.getElementById('regBarkod').value = txt; db.products.get(txt).then(p => { if(p) editProduct(txt); });
                    } else {
                        document.getElementById('reportBarkod').value = txt; db.products.get(txt).then(p => { if(p) { 
                            document.getElementById('smartSearch').value = p.n; document.getElementById('dispName').innerText = p.n; document.getElementById('dispPrice').innerText = `Normal: ${p.p} ₺`;
                            if(p.preImg) { document.getElementById('reportPreview').src = p.preImg; document.getElementById('reportPreview').classList.remove('hidden'); }
                        } });
                    }
                    html5QrCode.stop().then(() => r.style.display = 'none');
                });
            }
        }
    </script>
</body>
</html>
