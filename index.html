<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKT KONTROL - Pro Rapor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        .yakut-yesili { background-color: #004d40; }
        .turuncu { background-color: #E67E22; }
        .nav-btn { flex: 1; padding: 15px; font-weight: 800; transition: 0.3s; text-transform: uppercase; font-size: 0.75rem; }
        .active-tab { border-bottom: 5px solid #E67E22; color: #E67E22; background: #fff; }
        #reader { width: 100%; border-radius: 20px; overflow: hidden; display: none; border: 4px solid #004d40; }
        /* Rapor Taslak Alanı */
        #report-container { width: 794px; padding: 40px; background: white; position: absolute; left: -9999px; top: 0; }
    </style>
</head>
<body class="bg-gray-50 font-sans">
    <div class="max-w-md mx-auto bg-white min-h-screen shadow-2xl flex flex-col">
        <div class="yakut-yesili p-6 text-white text-center shadow-lg">
            <h1 class="text-3xl font-black italic">SKT KONTROL v2.1</h1>
            <p class="text-[10px] opacity-70 tracking-widest uppercase font-bold">Performans Analiz Sistemi</p>
        </div>

        <div class="flex bg-gray-100 border-b sticky top-0 z-50">
            <button onclick="showTab('kayit')" id="btn-kayit" class="nav-btn active-tab">💾 ÜRÜN KAYIT</button>
            <button onclick="showTab('rapor')" id="btn-rapor" class="nav-btn text-gray-400">📊 RAPOR HAZIRLA</button>
        </div>

        <div class="px-6 py-4 bg-white">
            <div id="reader" class="mb-4 shadow-2xl"></div>
            <button id="camBtn" onclick="toggleScanner()" class="w-full yakut-yesili text-white p-4 rounded-2xl font-black flex items-center justify-center gap-3 shadow-lg uppercase">
                📷 BARKODU TARA
            </button>
        </div>

        <div id="tab-kayit" class="p-6 space-y-6 pt-0">
            <input type="text" id="regBarkod" placeholder="Barkod" class="w-full border-b-4 border-gray-100 p-3 outline-none focus:border-emerald-700 font-mono text-xl bg-gray-50">
            <input type="text" id="regName" placeholder="Ürün İsmi" class="w-full border-b-4 border-gray-100 p-3 outline-none focus:border-emerald-700 text-lg">
            <input type="number" id="regPrice" placeholder="Satış Fiyatı (₺)" class="w-full border-b-4 border-gray-100 p-3 outline-none focus:border-emerald-700">
            <button onclick="saveProduct()" class="w-full bg-emerald-600 text-white py-5 rounded-2xl font-black shadow-xl uppercase">Sisteme İşle</button>
            <div id="productCounter" class="text-center text-[10px] font-black text-emerald-800 uppercase"></div>
        </div>

        <div id="tab-rapor" class="hidden p-6 space-y-6 pt-0">
            <div class="bg-gray-900 p-5 rounded-3xl shadow-2xl border-l-8 border-orange-500">
                <input type="text" id="reportBarkod" placeholder="Okutulan Barkod" class="w-full bg-transparent text-white font-mono text-xl text-center outline-none mb-2">
                <p id="dispName" class="font-black text-xl text-orange-500 uppercase italic">Ürün: Seçilmedi</p>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-gray-400 uppercase">Normal (Adet)</label>
                    <input type="number" id="nSales" class="w-full border-2 border-gray-100 p-4 rounded-2xl text-center font-black text-xl bg-white">
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-gray-400 uppercase text-orange-500">Insert (Adet)</label>
                    <input type="number" id="iSales" class="w-full border-2 border-orange-100 p-4 rounded-2xl text-center font-black text-xl bg-orange-50 text-orange-600">
                </div>
            </div>

            <div class="border-4 border-dotted border-gray-200 rounded-3xl p-6 text-center bg-gray-50">
                <input type="file" id="photoInput" accept="image/*" class="hidden">
                <label for="photoInput" class="cursor-pointer font-black text-gray-500 block uppercase">📸 Fotoğraf Ekle</label>
                <img id="preview" class="hidden mt-4 w-full h-48 object-cover rounded-2xl shadow-lg border-2 border-white">
            </div>

            <button onclick="generateReport()" class="turuncu w-full py-5 rounded-3xl text-white font-black shadow-2xl uppercase flex items-center justify-center gap-3">
                📄 PDF RAPORU OLUŞTUR
            </button>
        </div>
    </div>

    <div id="report-container">
        <div style="background: #004d40; padding: 40px; color: white; border-radius: 20px 20px 0 0; display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h1 style="font-size: 50px; font-weight: 900; margin: 0; letter-spacing: -2px;">SKT KONTROL</h1>
                <p style="text-transform: uppercase; letter-spacing: 8px; font-weight: 700; color: #E67E22; margin-top: 5px;">İNSERT ANALİZ RAPORU</p>
            </div>
            <div id="pdf-date" style="font-size: 20px; font-weight: 700; border-left: 4px solid #E67E22; padding-left: 20px;"></div>
        </div>
        
        <div style="display: flex; gap: 40px; margin-top: 40px;">
            <div style="flex: 1;">
                <div style="background: #f8fafc; border: 4px solid #e2e8f0; padding: 20px; border-radius: 20px;">
                    <img id="pdf-image" style="width: 100%; height: 450px; object-fit: cover; border-radius: 15px; border: 5px solid white; box-shadow: 0 10px 15px rgba(0,0,0,0.1);">
                    <h2 id="pdf-pName" style="font-size: 32px; font-weight: 900; color: #004d40; margin-top: 25px; text-transform: uppercase;"></h2>
                    <p id="pdf-barkod" style="font-size: 18px; color: #64748b; font-weight: 700; border-top: 2px solid #f1f5f9; padding-top: 15px;"></p>
                </div>
            </div>
            <div style="flex: 1; display: flex; flex-direction: column; gap: 30px;">
                <div style="background: #fef2f2; border: 4px solid #fee2e2; border-radius: 20px; text-align: center; padding: 40px;">
                    <p style="text-transform: uppercase; font-weight: 900; color: #ef4444; font-size: 14px; letter-spacing: 2px; margin-bottom: 10px;">Satış Artış Oranı</p>
                    <h1 id="pdf-percent" style="font-size: 120px; font-weight: 900; color: #dc2626; line-height: 1; margin: 0;"></h1>
                </div>
                <div style="background: #ecfdf5; border: 4px solid #d1fae5; border-radius: 20px; padding: 30px;">
                    <h3 style="color: #065f46; font-weight: 900; font-size: 12px; letter-spacing: 3px; margin-bottom: 20px; border-bottom: 2px solid #a7f3d0; padding-bottom: 10px;">AI ANALİZ MOTORU</h3>
                    <p id="pdf-ai-text" style="font-size: 20px; color: #064e3b; font-weight: 600; font-style: italic; line-height: 1.5;"></p>
                </div>
            </div>
        </div>
        <div style="margin-top: 60px; border-top: 2px dashed #cbd5e1; padding-top: 20px; display: flex; justify-content: space-between; font-weight: 800; color: #94a3b8; font-size: 14px;">
            <span>SİSTEM: INSERT PERFORMANCE ANALYZER V2.1</span>
            <span>İMZA: SELÇUK</span>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('skt_products')) || {};
        let html5QrCode;
        const beep = new Audio('https://www.soundjay.com/buttons/beep-07.mp3');

        function showTab(tab) {
            document.getElementById('tab-kayit').classList.toggle('hidden', tab !== 'kayit');
            document.getElementById('tab-rapor').classList.toggle('hidden', tab !== 'rapor');
            document.getElementById('btn-kayit').className = `nav-btn ${tab === 'kayit' ? 'active-tab' : 'text-gray-400'}`;
            document.getElementById('btn-rapor').className = `nav-btn ${tab === 'rapor' ? 'active-tab' : 'text-gray-400'}`;
        }

        function toggleScanner() {
            const r = document.getElementById('reader');
            if (r.style.display === 'block') stopScanner();
            else { r.style.display = 'block'; startScanner(); }
        }

        function startScanner() {
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 },
                (txt) => {
                    beep.play();
                    document.getElementById('regBarkod').value = txt;
                    document.getElementById('reportBarkod').value = txt;
                    loadProduct();
                    stopScanner();
                }
            ).catch(err => console.error(err));
        }

        function stopScanner() {
            if(html5QrCode) html5QrCode.stop().then(() => document.getElementById('reader').style.display = 'none');
        }

        function saveProduct() {
            const b = document.getElementById('regBarkod').value;
            const n = document.getElementById('regName').value;
            const p = document.getElementById('regPrice').value;
            if(!b || !n) return alert("Eksik bilgi!");
            db[b] = { n, p };
            localStorage.setItem('skt_products', JSON.stringify(db));
            alert("Kaydedildi!");
            updateCounter();
        }

        function loadProduct() {
            const b = document.getElementById('reportBarkod').value;
            const p = db[b];
            if(p) {
                document.getElementById('dispName').innerText = `Ürün: ${p.n}`;
            }
        }

        function updateCounter() {
            document.getElementById('productCounter').innerText = `Portföy: ${Object.keys(db).length} Ürün`;
        }
        updateCounter();

        document.getElementById('photoInput').onchange = e => {
            const [file] = e.target.files;
            if (file) {
                const url = URL.createObjectURL(file);
                document.getElementById('preview').src = url;
                document.getElementById('preview').classList.remove('hidden');
                document.getElementById('pdf-image').src = url;
            }
        };

        async function generateReport() {
            const b = document.getElementById('reportBarkod').value;
            const p = db[b];
            const n = parseFloat(document.getElementById('nSales').value);
            const i = parseFloat(document.getElementById('iSales').value);
            if(!p || isNaN(n) || isNaN(i)) return alert("Satış verilerini gir!");

            const pcn = ((i - n) / n * 100).toFixed(0);
            
            // PDF Taslağını Doldur
            document.getElementById('pdf-pName').innerText = p.n;
            document.getElementById('pdf-barkod').innerText = `BARKOD: ${b} | FİYAT: ${p.p} TL`;
            document.getElementById('pdf-percent').innerText = `%${pcn}`;
            document.getElementById('pdf-date').innerText = new Date().toLocaleDateString('tr-TR');
            document.getElementById('pdf-ai-text').innerText = `${p.n} ürününde kampanya dönemi boyunca %${pcn} oranında satış ivmesi yakalanmıştır. Bu başarı, reyon teşhirinin doğruluğunu ve fiyatlandırmanın müşterideki etkisini kanıtlamaktadır.`;

            const container = document.getElementById('report-container');
            container.style.position = 'static'; // Render için görünür yap
            
            const canvas = await html2canvas(container, { scale: 2, useCORS: true });
            const imgData = canvas.toDataURL('image/jpeg', 1.0);
            
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');
            const pageWidth = pdf.internal.pageSize.getWidth();
            const pageHeight = (canvas.height * pageWidth) / canvas.width;
            
            pdf.addImage(imgData, 'JPEG', 0, 0, pageWidth, pageHeight);
            pdf.save(`ANALIZ_${p.n}.pdf`);
            
            container.style.position = 'absolute'; // Geri gizle
            alert("Rapor Hazır!");
        }
    </script>
</body>
</html>
