<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKT KONTROL - Insert Analiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        .yakut-yesili { background-color: #004d40; }
        .turuncu { background-color: #E67E22; }
        .nav-btn { flex: 1; padding: 12px; font-weight: bold; transition: 0.3s; }
        .active-tab { border-bottom: 4px solid #E67E22; color: #E67E22; }
        #pdf-template { position: absolute; left: -9999px; top: -9999px; }
    </style>
</head>
<body class="bg-gray-100 font-sans">
    <div class="max-w-md mx-auto bg-white min-h-screen shadow-xl flex flex-col">
        <div class="yakut-yesili p-6 text-white text-center">
            <h1 class="text-2xl font-bold tracking-widest uppercase">SKT KONTROL</h1>
            <p class="text-xs opacity-75">Insert Performans & Kayıt Sistemi</p>
        </div>
        <div class="flex bg-white border-b sticky top-0 z-50">
            <button onclick="showTab('kayit')" id="btn-kayit" class="nav-btn active-tab uppercase text-sm">Ürün Kayıt</button>
            <button onclick="showTab('rapor')" id="btn-rapor" class="nav-btn uppercase text-sm text-gray-400">Rapor Hazırla</button>
        </div>
        <div id="tab-kayit" class="p-6 space-y-5">
            <h2 class="font-bold text-gray-700 border-l-4 border-emerald-800 pl-2 uppercase font-sans">Yeni Ürün Ekle</h2>
            <div class="space-y-4">
                <input type="text" id="regBarkod" placeholder="Barkod" class="w-full border-b-2 p-2 outline-none focus:border-emerald-700 font-mono">
                <input type="text" id="regName" placeholder="Ürün Adı" class="w-full border-b-2 p-2 outline-none focus:border-emerald-700">
                <input type="number" id="regPrice" placeholder="Normal Fiyat (₺)" class="w-full border-b-2 p-2 outline-none focus:border-emerald-700">
                <button onclick="saveProduct()" class="yakut-yesili w-full py-4 rounded-xl text-white font-bold shadow-lg uppercase">Sisteme Kaydet</button>
            </div>
            <div id="productCounter" class="text-center text-xs text-gray-400 font-bold uppercase"></div>
        </div>
        <div id="tab-rapor" class="hidden p-6 space-y-6">
            <div class="h-40 bg-black rounded-2xl relative flex items-center justify-center overflow-hidden border-4 border-gray-800 shadow-inner">
                <div class="z-10 text-white text-center">
                    <div class="w-40 h-1 bg-red-600 animate-bounce mb-2 mx-auto"></div>
                    <p class="text-[10px] font-mono uppercase">Barkod Bekleniyor...</p>
                </div>
            </div>
            <div class="space-y-4">
                <div class="flex gap-2">
                    <input type="text" id="reportBarkod" placeholder="Barkodu Gir" class="flex-1 border-b-2 p-2 font-mono outline-none">
                    <button onclick="loadProduct()" class="bg-gray-800 text-white px-4 rounded-lg text-xs font-bold uppercase">Getir</button>
                </div>
                <div class="bg-gray-50 p-4 rounded-xl">
                    <p id="dispName" class="font-bold text-lg text-gray-800 italic uppercase">Ürün: ---</p>
                    <p id="dispPrice" class="text-sm text-gray-500 font-semibold uppercase">Fiyat: ---</p>
                </div>
                <div class="flex gap-4">
                    <div class="flex-1">
                        <label class="text-[10px] font-bold text-gray-400 uppercase">Normal Satış (Adet)</label>
                        <input type="number" id="nSales" class="w-full border-b-2 p-2 outline-none focus:border-orange-500 font-bold">
                    </div>
                    <div class="flex-1">
                        <label class="text-[10px] font-bold text-gray-400 uppercase">Insert Satış (Adet)</label>
                        <input type="number" id="iSales" class="w-full border-b-2 p-2 outline-none focus:border-orange-500 font-bold">
                    </div>
                </div>
                <div class="border-2 border-dashed rounded-xl p-4 text-center">
                    <input type="file" id="photoInput" accept="image/*" class="hidden">
                    <label for="photoInput" class="cursor-pointer text-sm font-bold text-gray-500 block uppercase">📸 Reyon Fotoğrafı Ekle</label>
                    <img id="preview" class="hidden mt-2 w-full h-32 object-cover rounded-lg shadow-md">
                </div>
                <button onclick="generateReport()" class="turuncu w-full py-4 rounded-xl text-white font-black shadow-xl uppercase">📄 Raporu Hazırla ve Paylaş</button>
            </div>
        </div>
    </div>
    <div id="pdf-template" class="p-10 w-[800px] bg-white text-gray-900 border-[20px] border-gray-50">
        <div class="flex justify-between items-center border-b-8 border-orange-500 pb-6">
            <div>
                <h1 class="text-5xl font-black text-emerald-950 tracking-tighter">SKT KONTROL</h1>
                <p class="text-2xl text-orange-600 font-bold uppercase tracking-[10px]">PERFORMANS ANALİZİ</p>
            </div>
            <div id="pdf-date" class="text-xl font-mono text-gray-400"></div>
        </div>
        <div class="flex mt-12 gap-10">
            <div class="w-1/2">
                <h3 class="yakut-yesili text-white px-6 py-2 text-lg font-bold rounded-t-2xl uppercase">Ürün Ve Teşhir</h3>
                <div class="border-4 border-gray-100 p-4 rounded-b-2xl shadow-sm">
                    <img id="pdf-image" src="" class="w-full h-[400px] object-cover rounded-xl mb-6 shadow-md">
                    <p class="text-3xl font-black text-emerald-900 mb-2 uppercase" id="pdf-pName"></p>
                    <div class="flex justify-between font-bold text-gray-500 uppercase">
                        <span id="pdf-barkod"></span>
                        <span id="pdf-pPrice"></span>
                    </div>
                </div>
            </div>
            <div class="w-1/2 space-y-8">
                <div>
                    <h3 class="bg-red-600 text-white px-6 py-2 text-lg font-bold rounded-t-2xl uppercase italic">Satış Artış Performansı</h3>
                    <div class="bg-red-50 p-12 rounded-b-2xl border-x-4 border-b-4 border-red-100 text-center">
                        <span class="text-8xl font-black text-red-600" id="pdf-percent"></span>
                        <p class="text-red-400 font-bold uppercase mt-2 tracking-widest text-sm">Adet Bazlı Büyüme</p>
                    </div>
                </div>
                <div class="bg-emerald-50 p-8 rounded-3xl border-2 border-emerald-100">
                    <h4 class="text-emerald-900 font-black uppercase mb-4 text-sm tracking-widest flex items-center gap-2">
                        <span class="w-3 h-3 bg-emerald-600 rounded-full"></span> AI DESTEKLİ ANALİZ NOTU
                    </h4>
                    <p id="pdf-ai-text" class="text-xl text-emerald-800 leading-relaxed font-medium italic"></p>
                </div>
            </div>
        </div>
        <div class="mt-20 flex justify-between items-center text-gray-300 font-bold border-t pt-4 italic uppercase">
            <span>Modül: Insert Analyzer v1.2</span>
            <span>İmza: ____________________</span>
        </div>
    </div>
    <script>
        let db = JSON.parse(localStorage.getItem('skt_products')) || {};
        function showTab(tab) {
            document.getElementById('tab-kayit').classList.toggle('hidden', tab !== 'kayit');
            document.getElementById('tab-rapor').classList.toggle('hidden', tab !== 'rapor');
            document.getElementById('btn-kayit').className = `nav-btn uppercase text-sm ${tab === 'kayit' ? 'active-tab' : 'text-gray-400'}`;
            document.getElementById('btn-rapor').className = `nav-btn uppercase text-sm ${tab === 'rapor' ? 'active-tab' : 'text-gray-400'}`;
        }
        function saveProduct() {
            const barkod = document.getElementById('regBarkod').value;
            const name = document.getElementById('regName').value;
            const price = document.getElementById('regPrice').value;
            if(!barkod || !name) return alert("HATA: Bilgileri Eksiksiz Gir!");
            db[barkod] = { name, price };
            localStorage.setItem('skt_products', JSON.stringify(db));
            alert("BAŞARILI: Ürün Sisteme Kaydedildi!");
            document.getElementById('regBarkod').value = '';
            document.getElementById('regName').value = '';
            document.getElementById('regPrice').value = '';
            updateCounter();
        }
        function loadProduct() {
            const b = document.getElementById('reportBarkod').value;
            const p = db[b];
            if(p) {
                document.getElementById('dispName').innerText = `Ürün: ${p.name}`;
                document.getElementById('dispPrice').innerText = `Normal Fiyat: ${p.price} ₺`;
            } else alert("HATA: Bu Barkod Kayıtlı Değil!");
        }
        function updateCounter() {
            document.getElementById('productCounter').innerText = `SİSTEMDE KAYITLI ÜRÜN: ${Object.keys(db).length}`;
        }
        updateCounter();
        document.getElementById('photoInput').onchange = e => {
            const [file] = e.target.files;
            if (file) {
                const url = URL.createObjectURL(file);
                document.getElementById('preview').src = url;
                document.getElementById('preview').classList.remove('hidden');
                document.getElementById('pdf-image').src = url;
            }
        };
        async function generateReport() {
            const b = document.getElementById('reportBarkod').value;
            const p = db[b];
            const normal = parseFloat(document.getElementById('nSales').value);
            const insert = parseFloat(document.getElementById('iSales').value);
            if(!p || isNaN(normal) || isNaN(insert)) return alert("HATA: Satış Adetlerini Gir!");
            const percent = ((insert - normal) / normal * 100).toFixed(0);
            document.getElementById('pdf-pName').innerText = p.name;
            document.getElementById('pdf-barkod').innerText = `BARKOD: ${b}`;
            document.getElementById('pdf-pPrice').innerText = `FİYAT: ${p.price} ₺`;
            document.getElementById('pdf-percent').innerText = `%${percent}`;
            document.getElementById('pdf-date').innerText = new Date().toLocaleDateString('tr-TR');
            document.getElementById('pdf-ai-text').innerText = `${p.name} ürününde satışlar %${percent} artarak büyük bir başarı göstermiştir. Bu insert çalışması adet bazlı hedeflere ulaşmıştır.`;
            const element = document.getElementById('pdf-template');
            const opt = { margin: 0, filename: `${p.name}_Raporu.pdf`, image: { type: 'jpeg', quality: 1.0 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' } };
            await html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
