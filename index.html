<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İNSERT ELİTE PRO v6.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; color: #1a1a1a; }
        .yakut-yesili { background-color: #004d40; }
        .nav-btn { flex: 1; padding: 16px; font-weight: 800; text-transform: uppercase; font-size: 0.6rem; }
        .active-tab { background: white; color: #E67E22; border-bottom: 4px solid #E67E22; }
    </style>
</head>
<body>
    <div class="max-w-md mx-auto bg-white min-h-screen shadow-2xl flex flex-col relative text-black">
        <div class="yakut-yesili p-6 text-white text-center rounded-b-[35px]">
            <h1 class="text-2xl font-black italic uppercase tracking-tighter">İnsert Elite Pro</h1>
            <p class="text-[9px] opacity-60 uppercase font-bold tracking-[3px]">Smart Link v6.0</p>
        </div>

        <div class="flex bg-gray-50 mx-4 -mt-5 rounded-xl shadow-md overflow-hidden z-50">
            <button onclick="showTab('kayit')" id="btn-kayit" class="nav-btn active-tab">📦 Portföy</button>
            <button onclick="showTab('analiz')" id="btn-analiz" class="nav-btn text-gray-400">📈 Analiz</button>
            <button onclick="showTab('liste'); loadPoolList();" id="btn-liste" class="nav-btn text-gray-400">📋 Havuz</button>
        </div>

        <div id="tab-kayit" class="p-6 space-y-4">
            <div class="bg-blue-50 border-2 border-blue-100 p-5 rounded-[30px] text-center">
                <p class="text-[10px] font-black text-blue-800 uppercase mb-2">📄 Barkodsuz Liste Yükle</p>
                <input type="file" id="excelInput" accept=".xlsx, .xls" class="hidden" onchange="importExcelSmart(event)">
                <button onclick="document.getElementById('excelInput').click()" class="w-full bg-blue-600 text-white py-3 rounded-2xl font-black text-xs uppercase shadow-md active:scale-95 transition-all text-white">Dosyayı Seç</button>
                <p class="text-[8px] text-blue-400 mt-2">Barkod yoksa isimden otomatik eşleşir.</p>
            </div>
            
            <div class="bg-white p-5 rounded-[30px] border-2 border-gray-100 space-y-4 shadow-sm text-black">
                <input type="text" id="regBarkod" placeholder="Barkod (Boş bırakılabilir)" class="w-full border-b-2 p-2 outline-none font-mono text-xl text-black">
                <input type="text" id="regName" placeholder="Ürün Adı *" class="w-full border-b-2 p-2 outline-none font-bold text-lg uppercase text-black">
                <input type="text" id="regPrice" placeholder="Eski Fiyat (₺) *" class="w-full border-b-2 p-2 outline-none font-black text-emerald-700 text-black">
            </div>
            <button onclick="saveProduct()" class="w-full bg-emerald-800 text-white py-5 rounded-[25px] font-black shadow-2xl uppercase tracking-widest text-white">Kaydet</button>
        </div>
        
        </div>

    <script>
        const db = new Dexie("InsertEliteDB");
        db.version(3).stores({ products: "barkod, n, p, ip" });

        function importExcelSmart(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = async (event) => {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                let count = 0;
                for (let r of jsonData) {
                    const name = r["İSİM"] || r["Ürün Adı"] || r["AÇIKLAMA"];
                    // Barkod yoksa ismi barkod gibi kullanıyoruz (Smart Link)
                    const barkod = String(r["Barkod"] || r["BARKOD"] || "ID-" + Math.floor(Math.random() * 1000000));
                    const eski = r["ESKİ FİYAT"] || r["Eski Fiyat"] || 0;
                    const yeni = r["YENİ FİYAT"] || r["Yeni Fiyat"] || 0;
                    
                    if(name) {
                        await db.products.put({ barkod, n: name, p: eski, ip: yeni, img: "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=" });
                        count++;
                    }
                }
                alert(count + " Ürün İsimle Eşleşti! ✅"); location.reload();
            };
            reader.readAsArrayBuffer(file);
        }
        
        function showTab(tab) {
            ['kayit','analiz','liste'].forEach(t => document.getElementById('tab-'+t)?.classList.add('hidden'));
            document.getElementById('tab-'+tab)?.classList.remove('hidden');
            ['kayit','analiz','liste'].forEach(t => document.getElementById('btn-'+t).className = `nav-btn ${t===tab?'active-tab':'text-gray-400'}`);
        }
    </script>
</body>
</html>
